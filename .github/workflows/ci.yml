name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check backend
        run: npx tsc --project tsconfig.node.json --noEmit

      - name: Build frontend
        run: npm run build

      - name: Test
        run: npm test
